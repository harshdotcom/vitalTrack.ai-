<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">
                <span class="logo-icon">+</span>
                <h1>Vitatrack.ai</h1>
            </div>
            <h2>Welcome Back</h2>
            <p>Log in to access your medical journal</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" formControlName="email" placeholder="doctor@example.com"
                    [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    <span *ngIf="loginForm.get('email')?.hasError('required')">Email is required.</span>
                    <span *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email address.</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-wrapper">
                    <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                        placeholder="Enter your password"
                        [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()">
                        <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <div class="error-message"
                    *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <span *ngIf="loginForm.get('password')?.hasError('required')">Password is required.</span>
                </div>
            </div>

            <div class="form-actions">
                <!-- Error message block -->
                <div class="api-error" *ngIf="errorMessage">
                    {{ errorMessage }}
                </div>

                <button type="submit" class="btn-primary full-width" [disabled]="isLoading">
                    <span *ngIf="!isLoading">Log In</span>
                    <span *ngIf="isLoading" class="loader"></span>
                </button>
            </div>

        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/signup">Sign up</a></p>
        </div>
    </div>

    <!-- Trademark and Credits -->
    <div class="global-footer">
        <p>Vitatrack.ai is forever free to use.</p>
        <p>Developed with ❤️ by the ByIITians team.</p>
    </div>
</div>
