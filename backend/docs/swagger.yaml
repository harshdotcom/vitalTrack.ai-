basePath: /api/v1
definitions:
  models.Document:
    properties:
      analysis_generated:
        type: boolean
      category:
        type: string
      document_date:
        type: string
      document_name:
        type: string
      file:
        $ref: '#/definitions/models.File'
      id:
        type: string
      status:
        type: string
      tags:
        description: JSON string
        type: string
      user_id:
        description: ID         string    `json:"id" gorm:"type:uuid;default:gen_random_uuid();primaryKey"`
        type: integer
    type: object
  models.File:
    properties:
      createdAt:
        type: string
      fileSize:
        format: int64
        type: integer
      id:
        type: string
      mimeType:
        type: string
      originalName:
        type: string
      s3Key:
        type: string
      storedName:
        type: string
      uploadedBy:
        format: int64
        type: integer
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.ForgetPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.InfiniteScrollResponse:
    properties:
      cursor:
        type: string
      data:
        items:
          $ref: '#/definitions/models.Document'
        type: array
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.Measurement:
    properties:
      unit:
        description: e.g. "kg", "lb", "mg/dL", "mmol/L"
        type: string
      value:
        type: number
    type: object
  models.ResetPasswordRequest:
    properties:
      email:
        type: string
      new_password:
        minLength: 8
        type: string
      otp:
        type: string
    required:
    - email
    - new_password
    - otp
    type: object
  models.SaveHealthMetricRequest:
    properties:
      blood_pressure:
        properties:
          diastolic:
            example: 80
            type: integer
          systolic:
            example: 120
            type: integer
        type: object
      blood_sugar:
        $ref: '#/definitions/models.Measurement'
      calories:
        description: kcal burned/consumed
        example: 2200
        type: integer
      heart_rate:
        example: 72
        type: integer
      notes:
        type: string
      oxygen_level:
        description: SpO2 (%)
        example: 98
        type: number
      sleep_hours:
        description: hours (e.g., 7.5)
        example: 7.5
        type: number
      steps:
        description: daily steps
        example: 8500
        type: integer
      timestamp:
        example: "2026-04-16T22:05:00+05:30"
        type: string
      weight:
        $ref: '#/definitions/models.Measurement'
    type: object
  models.User:
    properties:
      age:
        type: integer
      created_at:
        description: YYYY-MM-DD HH:MM:SS.microseconds stored in DB
        type: string
      dob:
        type: string
      email:
        type: string
      gender:
        type: string
      google_id:
        type: string
      is_verified:
        type: boolean
      name:
        type: string
      profile_pic:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    required:
    - email
    - name
    type: object
host: localhost:8081
info:
  contact: {}
  description: API documentation for Vita Track AI
  title: Vita Track AI API
  version: "1.0"
paths:
  /documents:
    post:
      responses: {}
      summary: Create Document
      tags:
      - Document
  /documents/{id}:
    delete:
      responses: {}
      summary: Delete Document
      tags:
      - Document
    get:
      responses: {}
      summary: Get Document
      tags:
      - Document
  /documents/calendar:
    post:
      responses: {}
      summary: Get Calendar Documents
      tags:
      - Document
  /documents/infiniteScroll:
    get:
      parameters:
      - description: Base64 encoded cursor from previous response
        in: query
        name: cursor
        type: string
      - description: 'Number of documents to fetch (default: 12)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.InfiniteScrollResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Infinite Scroll Documents
      tags:
      - Document
  /documents/update/{id}:
    patch:
      consumes:
      - multipart/form-data
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Category [Prescription or Medical Report]
        in: formData
        name: category
        type: string
      - description: DocumentName
        in: formData
        name: document_name
        type: string
      - description: DocumentDate (YYYY-MM-DD)
        in: formData
        name: document_date
        type: string
      - description: tags
        in: formData
        name: Tags
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update Document
      tags:
      - Document
  /files/{id}:
    delete:
      responses: {}
      summary: Delete File
      tags:
      - File
    get:
      responses: {}
      summary: Get File
      tags:
      - File
  /files/ai/{id}:
    get:
      responses: {}
      summary: Get File AI Analysis
      tags:
      - File
  /files/ocr/{id}:
    get:
      responses: {}
      summary: Get File Text
      tags:
      - File
  /files/upload:
    post:
      responses: {}
      summary: Upload File
      tags:
      - File
  /health-metric/save:
    post:
      consumes:
      - application/json
      description: Create a new health metric entry for the logged-in user
      parameters:
      - description: Health metric payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.SaveHealthMetricRequest'
      produces:
      - application/json
      responses:
        "201":
          description: health metric saved successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Save health metric
      tags:
      - Health
  /user-details/ai-credits:
    get:
      responses: {}
      summary: Get AI Credit Usage
      tags:
      - User-Details
  /user-details/update:
    patch:
      consumes:
      - application/json
      - multipart/form-data
      parameters:
      - description: Name
        in: formData
        name: name
        type: string
      - description: DeleteProfilePic
        in: formData
        name: delete_profile_pic
        type: string
      - description: Date of Birth (YYYY-MM-DD)
        in: formData
        name: dob
        type: string
      - description: Gender
        in: formData
        name: gender
        type: string
      - description: Profile Picture
        in: formData
        name: profile_pic
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
